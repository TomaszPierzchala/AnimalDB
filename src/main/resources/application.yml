spring:
  application:
    name: animal-house

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:animaldb}
    username: ${DB_USERNAME:dbadmin}
    password: ${DB_PASSWORD:ANIMALDB_PASSWORD}

  flyway:
    enabled: true

  jpa:
    hibernate:
      ddl-auto: validate

app:
  cors:
    allowed-origin: ${FRONTEND_URL:http://localhost:5173}

server:
  port: ${PORT:8080}
